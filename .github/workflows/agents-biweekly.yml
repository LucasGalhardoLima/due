name: "Agent: Brand & Growth Strategist (Bi-weekly)"

on:
  schedule:
    - cron: "0 11 1,15 * *"
  workflow_dispatch:

jobs:
  brand-strategist:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run Brand & Growth Strategist agent
        run: npx tsx scripts/agents/brand-strategist.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
          DU_APP_URL: ${{ vars.DU_APP_URL }}
          SCREENSHOT_EMAIL: ${{ secrets.SCREENSHOT_EMAIL }}
          SCREENSHOT_PASSWORD: ${{ secrets.SCREENSHOT_PASSWORD }}
